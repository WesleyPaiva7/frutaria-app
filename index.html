<!DOCTYPE html>
<html>
<head>
  <title>Frutaria - Sistema</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#28a745">

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 10px;
}

h2 {
  background: #222;
  color: white;
  padding: 10px;
  border-radius: 8px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  border: none;
  font-weight: bold;
}

.btn-verde { background: #28a745; color: white; }
.btn-azul { background: #007bff; color: white; }
.btn-vermelho { background: #dc3545; color: white; }

.card {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

li {
  margin: 5px 0;
}
</style>

</head>
<body>

<div class="card">
<h2>Cadastro de Produtos</h2>
<input id="nome" placeholder="Produto">
<input id="precoCompra" placeholder="Preço inicial de compra">
<input id="preco" placeholder="Preço de venda">
<input id="estoque" placeholder="Estoque inicial">
<select id="unidade">
  <option value="kg">kg</option>
  <option value="un">un</option>
</select>
<button class="btn-azul" onclick="addProduto()">Adicionar</button>
</div>

<div class="card">
<h2>Produtos</h2>
<ul id="lista"></ul>
</div>

<div class="card">
<h2>Venda</h2>
<select id="produtoVenda"></select>
<input id="quantidade" placeholder="Quantidade">
<button class="btn-verde" onclick="vender()">Vender</button>
</div>

<div class="card">
<h2>Entrada de Estoque</h2>
<select id="produtoEntrada"></select>
<input id="qtdEntrada" placeholder="Quantidade">
<input id="precoEntrada" placeholder="Preço de Compra">
<button class="btn-azul" onclick="entradaEstoque()">Adicionar Estoque</button>
</div>

<div class="card">
<h2>Registro de Vendas</h2>
<ul id="historico"></ul>
<button class="btn-vermelho" onclick="limparHistorico()">Limpar Histórico</button>
</div>

<div class="card">
<button class="btn-vermelho" onclick="resetarSistema()">⚠️ Zerar Sistema</button>
</div>

<div class="card">
<h2>Relatórios</h2>
<p id="totalDia"></p>
<p id="totalSemana"></p>
<p id="totalMes"></p>
<p id="lucroTotal"></p>
</div>

<script>
let produtos = [];
let historico = [];

function parseNumero(valor) {
  if (!valor) return 0;
  return parseFloat(valor.toString().replace(",", "."));
}

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function addProduto() {
  let nome = document.getElementById("nome").value.trim().toLowerCase();
  let precoCompra = parseNumero(document.getElementById("precoCompra").value);
  let preco = parseNumero(document.getElementById("preco").value);
  let estoque = parseNumero(document.getElementById("estoque").value);
  let unidade = document.getElementById("unidade").value;

  if (!nome || preco <= 0) {
    alert("Preencha corretamente!");
    return;
  }

  produtos.push({ nome, precoCompra, preco, estoque, unidade });

  salvarDados();
  atualizarLista();
  atualizarSelects();
}

function atualizarLista() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  produtos.forEach((p, i) => {
    lista.innerHTML += `
      <li>
        ${p.nome} | Custo: ${formatarMoeda(p.precoCompra)} | Venda: ${formatarMoeda(p.preco)} | Estoque: ${p.estoque} ${p.unidade}
        <button onclick="editarPreco(${i})">✏️</button>
        <button onclick="removerProduto(${i})">❌</button>
      </li>
    `;
  });
}

function atualizarSelects() {
  let v = document.getElementById("produtoVenda");
  let e = document.getElementById("produtoEntrada");

  v.innerHTML = "";
  e.innerHTML = "";

  produtos.forEach(p => {
    v.innerHTML += `<option value="${p.nome}">${p.nome}</option>`;
    e.innerHTML += `<option value="${p.nome}">${p.nome}</option>`;
  });
}

function editarPreco(i) {
  let novo = prompt("Novo preço de venda:");
  let valor = parseNumero(novo);

  if (!isNaN(valor) && valor > 0) {
    produtos[i].preco = valor;
    salvarDados();
    atualizarLista();
  }
}

function vender() {
  let nome = document.getElementById("produtoVenda").value;
  let qtd = parseNumero(document.getElementById("quantidade").value);

  let p = produtos.find(x => x.nome === nome);

  if (!p || qtd <= 0 || p.estoque < qtd) {
    alert("Erro na venda");
    return;
  }

  p.estoque -= qtd;

  let total = qtd * p.preco;
  let lucro = qtd * (p.preco - p.precoCompra);

  historico.push({
    data: new Date().toISOString(),
    nome,
    quantidade: qtd,
    unidade: p.unidade,
    total,
    lucro
  });

  salvarDados();
  atualizarLista();
  atualizarHistorico();
  calcularRelatorios();
}

function removerVenda(index) {
  let venda = historico[index];
  let p = produtos.find(x => x.nome === venda.nome);

  if (p) {
    p.estoque += venda.quantidade;
  }

  historico.splice(index, 1);

  salvarDados();
  atualizarLista();
  atualizarHistorico();
  calcularRelatorios();
}

function entradaEstoque() {
  let nome = document.getElementById("produtoEntrada").value;
  let qtd = parseNumero(document.getElementById("qtdEntrada").value);
  let precoNovo = parseNumero(document.getElementById("precoEntrada").value);

  let p = produtos.find(x => x.nome === nome);

  if (!p || qtd <= 0 || precoNovo <= 0) {
    alert("Erro na entrada");
    return;
  }

  let totalAntigo = p.precoCompra * p.estoque;
  let totalNovo = precoNovo * qtd;
  let novoEstoque = p.estoque + qtd;

  p.precoCompra = (totalAntigo + totalNovo) / novoEstoque;
  p.estoque = novoEstoque;

  salvarDados();
  atualizarLista();
}

function atualizarHistorico() {
  let lista = document.getElementById("historico");
  lista.innerHTML = "";

  historico.forEach((h, i) => {
    lista.innerHTML += `
      <li>
        ${new Date(h.data).toLocaleString()} | ${h.nome} | ${h.quantidade} ${h.unidade}
        | ${formatarMoeda(h.total)} | Lucro: ${formatarMoeda(h.lucro)}
        <button onclick="removerVenda(${i})">❌</button>
      </li>
    `;
  });
}

function calcularRelatorios() {
  let hoje = new Date();

  let totalDia = 0;
  let totalSemana = 0;
  let totalMes = 0;
  let lucroTotal = 0;

  historico.forEach(v => {
    let d = new Date(v.data);

    lucroTotal += v.lucro;

    if (d.toDateString() === hoje.toDateString()) totalDia += v.total;

    let diff = (hoje - d) / (1000 * 60 * 60 * 24);
    if (diff <= 7) totalSemana += v.total;

    if (d.getMonth() === hoje.getMonth()) totalMes += v.total;
  });

  document.getElementById("totalDia").innerText = "Hoje: " + formatarMoeda(totalDia);
  document.getElementById("totalSemana").innerText = "Semana: " + formatarMoeda(totalSemana);
  document.getElementById("totalMes").innerText = "Mês: " + formatarMoeda(totalMes);
  document.getElementById("lucroTotal").innerText = "Lucro: " + formatarMoeda(lucroTotal);
}

function limparHistorico() {
  historico = [];
  salvarDados();
  atualizarHistorico();
  calcularRelatorios();
}

function resetarSistema() {
  if (confirm("Vai apagar tudo!")) {
    produtos = [];
    historico = [];
    salvarDados();
    atualizarLista();
    atualizarHistorico();
    atualizarSelects();
    calcularRelatorios();
  }
}

function removerProduto(i) {
  produtos.splice(i, 1);
  salvarDados();
  atualizarLista();
  atualizarSelects();
}

function salvarDados() {
  localStorage.setItem("produtos", JSON.stringify(produtos));
  localStorage.setItem("historico", JSON.stringify(historico));
}

function carregarDados() {
  produtos = JSON.parse(localStorage.getItem("produtos")) || [];
  historico = JSON.parse(localStorage.getItem("historico")) || [];

  atualizarLista();
  atualizarSelects();
  atualizarHistorico();
  calcularRelatorios();
}

carregarDados();
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
