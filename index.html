<!DOCTYPE html>
<html>
<head>
  <title>Login Frutaria</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;text-align:center;}
button{width:100%;padding:15px;margin:10px 0;border:none;border-radius:8px;font-size:16px;}
.btn-azul{background:#007bff;color:#fff;}
.btn-vermelho{background:#dc3545;color:#fff;}
.card{background:#fff;padding:20px;border-radius:10px;}
</style>
</head>
<body>

<div class="card">
  <button class="btn-azul" onclick="login()">Entrar com Google</button>
  <button class="btn-vermelho" onclick="logout()">Sair</button>
  <p id="usuario">Não logado</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw8xX29KgU3cqa_TNskv3ZHK0pjcyjdsQ",
  authDomain: "frutaria-app.firebaseapp.com",
  projectId: "frutaria-app",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN (REDIRECIONAMENTO)
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

// RESULTADO DO LOGIN
auth.getRedirectResult().then(result => {
  if(result.user){
    document.getElementById("usuario").innerText = "Logado: " + result.user.email;
  }
}).catch(error => {
  console.log(error);
});

// ESTADO DO USUÁRIO
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("usuario").innerText = "Logado: " + user.email;
  }else{
    document.getElementById("usuario").innerText = "Não logado";
  }
});

// LOGOUT
function logout(){
  auth.signOut();
}
</script>

</body>
</html>
