<!DOCTYPE html>
<html>
<head>
  <title>Frutaria Sistema</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px;}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px;}
input,button{width:100%;padding:12px;margin:5px 0;border-radius:8px;}
button{border:none;font-weight:bold;}
.btn-verde{background:#28a745;color:#fff;}
.btn-azul{background:#007bff;color:#fff;}
.btn-vermelho{background:#dc3545;color:#fff;}
h2{background:#222;color:#fff;padding:10px;border-radius:8px;}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn-azul" onclick="login()">Entrar</button>
  <button class="btn-verde" onclick="criarConta()">Criar Conta</button>
  <button class="btn-vermelho" onclick="logout()">Sair</button>
  <p id="usuario">Não logado</p>
</div>

<div id="sistema" style="display:none">

<div class="card">
<h2>Cadastro de Produtos</h2>
<input id="nome" placeholder="Produto">
<input id="preco" placeholder="Preço">
<input id="estoque" placeholder="Estoque">
<button class="btn-azul" onclick="addProduto()">Adicionar</button>
</div>

<div class="card">
<h2>Produtos</h2>
<ul id="lista"></ul>
</div>

<div class="card">
<h2>Venda</h2>
<select id="produtoVenda"></select>
<input id="quantidade" placeholder="Quantidade">
<button class="btn-verde" onclick="vender()">Vender</button>
</div>

<div class="card">
<h2>Histórico</h2>
<ul id="historico"></ul>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw8xX29KgU3cqa_TNskv3ZHK0pjcyjdsQ",
  authDomain: "frutaria-app.firebaseapp.com",
  projectId: "frutaria-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login(){
  let email = document.getElementById("email").value.trim();
  let senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    alert("Preencha email e senha");
    return;
  }

  auth.signInWithEmailAndPassword(email, senha)
    .catch(e=>alert(e.message));
}

// CRIAR CONTA
function criarConta(){
  let email = document.getElementById("email").value.trim();
  let senha = document.getElementById("senha").value.trim();

  if(!email || !senha){
    alert("Preencha email e senha");
    return;
  }

  auth.createUserWithEmailAndPassword(email, senha)
    .then(()=>alert("Conta criada!"))
    .catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
  auth.signOut();
}

// ESTADO
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("usuario").innerText="Logado: "+user.email;
    document.getElementById("sistema").style.display="block";
    carregar();
  }else{
    document.getElementById("usuario").innerText="Não logado";
    document.getElementById("sistema").style.display="none";
  }
});

// DADOS
let produtos=[];
let historico=[];

function salvar(){
  db.collection("dados").doc(auth.currentUser.uid)
    .set({produtos,historico});
}

function carregar(){
  db.collection("dados").doc(auth.currentUser.uid)
    .onSnapshot(doc=>{
      if(doc.exists){
        produtos=doc.data().produtos||[];
        historico=doc.data().historico||[];
        atualizar();
      }
    });
}

function addProduto(){
  let nome=document.getElementById("nome").value;
  let preco=parseFloat(document.getElementById("preco").value)||0;
  let estoque=parseFloat(document.getElementById("estoque").value)||0;

  if(!nome) return alert("Digite o nome");

  produtos.push({nome,preco,estoque});
  salvar();
}

function vender(){
  let nome=document.getElementById("produtoVenda").value;
  let qtd=parseFloat(document.getElementById("quantidade").value)||0;

  let p=produtos.find(x=>x.nome===nome);
  if(!p||p.estoque<qtd) return alert("Erro na venda");

  p.estoque-=qtd;

  historico.push({
    nome,qtd,data:new Date().toLocaleString()
  });

  salvar();
}

function atualizar(){
  let l=document.getElementById("lista");
  let v=document.getElementById("produtoVenda");

  l.innerHTML="";
  v.innerHTML="";

  produtos.forEach(p=>{
    l.innerHTML+=`<li>${p.nome} - ${p.estoque}</li>`;
    v.innerHTML+=`<option>${p.nome}</option>`;
  });

  let h=document.getElementById("historico");
  h.innerHTML="";
  historico.forEach(x=>{
    h.innerHTML+=`<li>${x.data} - ${x.nome} (${x.qtd})</li>`;
  });
}
</script>

</body>
</html>
