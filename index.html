<!DOCTYPE html>
<html>
<head>
  <title>Frutaria Sistema</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#28a745">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px;}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px;}
input,select,button{width:100%;padding:12px;margin:5px 0;border-radius:8px;}
button{border:none;font-weight:bold;}
.btn-verde{background:#28a745;color:#fff;}
.btn-azul{background:#007bff;color:#fff;}
.btn-vermelho{background:#dc3545;color:#fff;}
h2{background:#222;color:#fff;padding:10px;border-radius:8px;}
</style>
</head>

<body>

<div class="card">
  <button class="btn-azul" onclick="login()">Entrar com Google</button>
  <button class="btn-vermelho" onclick="logout()">Sair</button>
  <p id="usuario">Não logado</p>
</div>

<div id="sistema" style="display:none">

<div class="card">
<h2>Cadastro de Produtos</h2>
<input id="nome" placeholder="Produto">
<input id="precoCompra" placeholder="Preço de compra">
<input id="preco" placeholder="Preço de venda">
<input id="estoque" placeholder="Estoque inicial">
<select id="unidade">
<option value="kg">kg</option>
<option value="un">un</option>
</select>
<button class="btn-azul" onclick="addProduto()">Adicionar</button>
</div>

<div class="card">
<h2>Produtos</h2>
<ul id="lista"></ul>
</div>

<div class="card">
<h2>Venda</h2>
<select id="produtoVenda"></select>
<input id="quantidade" placeholder="Quantidade">
<button class="btn-verde" onclick="vender()">Vender</button>
</div>

<div class="card">
<h2>Entrada de Estoque</h2>
<select id="produtoEntrada"></select>
<input id="qtdEntrada" placeholder="Quantidade">
<input id="precoEntrada" placeholder="Preço de Compra">
<button class="btn-azul" onclick="entradaEstoque()">Adicionar Estoque</button>
</div>

<div class="card">
<h2>Histórico</h2>
<ul id="historico"></ul>
</div>

<div class="card">
<h2>Relatórios</h2>
<p id="totalDia"></p>
<p id="totalSemana"></p>
<p id="totalMes"></p>
<p id="lucroTotal"></p>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw8xX29KgU3cqa_TNskv3ZHK0pjcyjdsQ",
  authDomain: "frutaria-app.firebaseapp.com",
  projectId: "frutaria-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let produtos = [];
let historico = [];

// LOGIN REDIRECT (FUNCIONA NO CELULAR)
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

// RESULTADO DO LOGIN
auth.getRedirectResult().then(result=>{
  if(result.user){
    console.log("Logado:", result.user.email);
  }
});

// ESTADO DO USUÁRIO
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("usuario").innerText = "Logado: " + user.email;
    document.getElementById("sistema").style.display = "block";
    carregarDados();
  }else{
    document.getElementById("usuario").innerText = "Não logado";
    document.getElementById("sistema").style.display = "none";
  }
});

// LOGOUT
function logout(){
  auth.signOut();
}

// FUNÇÕES
function parseNumero(v){
  return parseFloat((v||"0").toString().replace(",", "."))||0;
}

function moeda(v){
  return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function salvarDados(){
  db.collection("sistema").doc("dados").set({produtos,historico});
}

function carregarDados(){
  db.collection("sistema").doc("dados").onSnapshot(doc=>{
    if(doc.exists){
      let d = doc.data();
      produtos = d.produtos || [];
      historico = d.historico || [];
      atualizarTudo();
    }
  });
}

function addProduto(){
  let nome=document.getElementById("nome").value.trim().toLowerCase();
  let precoCompra=parseNumero(document.getElementById("precoCompra").value);
  let preco=parseNumero(document.getElementById("preco").value);
  let estoque=parseNumero(document.getElementById("estoque").value);
  let unidade=document.getElementById("unidade").value;

  if(!nome||preco<=0) return alert("Preencha corretamente");

  produtos.push({nome,precoCompra,preco,estoque,unidade});
  salvarDados();
}

function vender(){
  let nome=document.getElementById("produtoVenda").value;
  let qtd=parseNumero(document.getElementById("quantidade").value);
  let p=produtos.find(x=>x.nome===nome);

  if(!p||qtd<=0||p.estoque<qtd) return alert("Erro");

  p.estoque-=qtd;

  let total=qtd*p.preco;
  let lucro=qtd*(p.preco-p.precoCompra);

  historico.push({
    data:new Date().toISOString(),
    nome,quantidade:qtd,unidade:p.unidade,total,lucro
  });

  salvarDados();
}

function entradaEstoque(){
  let nome=document.getElementById("produtoEntrada").value;
  let qtd=parseNumero(document.getElementById("qtdEntrada").value);
  let precoNovo=parseNumero(document.getElementById("precoEntrada").value);
  let p=produtos.find(x=>x.nome===nome);

  if(!p||qtd<=0||precoNovo<=0) return alert("Erro");

  let totalAntigo=p.precoCompra*p.estoque;
  let totalNovo=precoNovo*qtd;
  let novoEstoque=p.estoque+qtd;

  p.precoCompra=(totalAntigo+totalNovo)/novoEstoque;
  p.estoque=novoEstoque;

  salvarDados();
}

function atualizarTudo(){
  atualizarLista();
  atualizarSelects();
  atualizarHistorico();
  calcularRelatorios();
}

function atualizarLista(){
  let l=document.getElementById("lista");
  l.innerHTML="";
  produtos.forEach((p,i)=>{
    l.innerHTML+=`
<li>${p.nome} | Venda: ${moeda(p.preco)} | Estoque: ${p.estoque}
<button onclick="removerProduto(${i})">❌</button></li>`;
  });
}

function atualizarSelects(){
  let v=document.getElementById("produtoVenda");
  let e=document.getElementById("produtoEntrada");
  v.innerHTML=""; e.innerHTML="";
  produtos.forEach(p=>{
    v.innerHTML+=`<option>${p.nome}</option>`;
    e.innerHTML+=`<option>${p.nome}</option>`;
  });
}

function atualizarHistorico(){
  let h=document.getElementById("historico");
  h.innerHTML="";
  historico.forEach((x,i)=>{
    h.innerHTML+=`
<li>${new Date(x.data).toLocaleString()} | ${x.nome} | ${x.quantidade} ${x.unidade} | Total: ${moeda(x.total)} | Lucro: ${moeda(x.lucro)}</li>`;
  });
}

function calcularRelatorios(){
  let hoje=new Date();
  let d=0,s=0,m=0,l=0;

  historico.forEach(v=>{
    let data=new Date(v.data);
    l+=v.lucro;
    if(data.toDateString()===hoje.toDateString()) d+=v.total;
    if((hoje-data)/(1000*60*60*24)<=7) s+=v.total;
    if(data.getMonth()===hoje.getMonth()) m+=v.total;
  });

  document.getElementById("totalDia").innerText="Hoje: "+moeda(d);
  document.getElementById("totalSemana").innerText="Semana: "+moeda(s);
  document.getElementById("totalMes").innerText="Mês: "+moeda(m);
  document.getElementById("lucroTotal").innerText="Lucro: "+moeda(l);
}
</script>

</body>
</html>
